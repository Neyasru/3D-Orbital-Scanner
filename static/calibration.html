<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calibración — Escáner 3D</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface-2: #f0efeb;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #888780;
      --accent: #378add;
      --accent-bg: #e6f1fb;
      --success: #3b6d11;
      --success-bg: #eaf3de;
      --success-fill: #639922;
      --danger: #a32d2d;
      --danger-bg: #fcebeb;
      --danger-border: #f09595;
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --surface: #2c2c2a;
        --surface-2: #232321;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.16);
        --text: #f0efeb;
        --text-secondary: #b4b2a9;
        --text-muted: #888780;
        --accent-bg: #042c53;
        --success-bg: #173404;
        --danger-bg: #501313;
        --danger-border: #791f1f;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app { width: 100%; max-width: 520px; }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .back-btn {
      background: none;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 6px 10px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header h1 { font-size: 18px; font-weight: 500; }

    .preview {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
    }
    .preview svg { width: 48px; height: 48px; color: var(--border-strong); }
    .preview-label { font-size: 13px; color: var(--text-muted); }
    .preview img { width: 100%; height: 100%; object-fit: contain; display: none; }
    .photo-count-badge {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: var(--radius);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }
    button {
      border-radius: var(--radius);
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-preview {
      grid-column: span 2;
      background: var(--surface);
      color: var(--text);
      border: 0.5px solid var(--border-strong);
    }
    .btn-preview.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
    .btn-capture {
      background: var(--success-bg);
      color: var(--success);
      border: 0.5px solid currentColor;
    }
    .btn-calibrate {
      background: var(--accent-bg);
      color: var(--accent);
      border: 0.5px solid var(--accent);
    }
    .btn-del {
      background: none;
      border: 0.5px solid var(--danger-border);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 12px;
      color: var(--danger);
      cursor: pointer;
    }

    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: none;
    }
    .result-card.visible { display: block; }
    .result-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .result-value { font-size: 24px; font-weight: 500; }
    .result-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .result-ok { color: var(--success); }
    .result-warn { color: #b07d00; }

    .section-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
    }
    .photo-thumb {
      position: relative;
      aspect-ratio: 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 0.5px solid var(--border);
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb .del-btn {
      position: absolute;
      top: 3px; right: 3px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 4px;
      width: 20px; height: 20px;
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
    }
    .empty-photos {
      grid-column: span 4;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 1.5rem 0;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <button class="back-btn" onclick="location.href='/'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </button>
    <h1>Calibración de cámara</h1>
  </div>

  <div class="preview" id="preview-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    <span class="preview-label" id="preview-label">Activa el preview para encuadrar el tablero</span>
    <img id="preview-img" alt="Stream">
    <div class="photo-count-badge" id="photo-count">0 fotos</div>
  </div>

  <div class="controls">
    <button class="btn-preview" id="btn-preview" onclick="togglePreview()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
      Activar preview
    </button>
    <button class="btn-capture" id="btn-capture" onclick="capturePhoto()" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      Capturar
    </button>
    <button class="btn-calibrate" id="btn-calibrate" onclick="runCalibration()" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Calibrar
    </button>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-title">Error de reproyección</div>
    <div class="result-value" id="result-value">—</div>
    <div class="result-hint" id="result-hint"></div>
  </div>

  <div class="section-title">Fotos de calibración (<span id="photo-count-label">0</span>)</div>
  <div class="photos-grid" id="photos-grid">
    <div class="empty-photos">Sin fotos todavía — activa el preview y captura el tablero</div>
  </div>

</div>
<script>
  let previewActive = false;
  let photos = [];

  async function togglePreview() {
    previewActive = !previewActive;
    const btn = document.getElementById('btn-preview');
    const img = document.getElementById('preview-img');
    const icon = document.querySelector('.preview svg');
    const label = document.getElementById('preview-label');
    if (previewActive) {
      await fetch('/stream/start', { method: 'POST' });
      img.src = '/stream/feed?' + Date.now();
      img.style.display = 'block';
      icon.style.display = 'none';
      label.style.display = 'none';
      btn.textContent = 'Desactivar preview';
      btn.classList.add('active');
      document.getElementById('btn-capture').disabled = false;
    } else {
      await fetch('/stream/stop', { method: 'POST' });
      img.style.display = 'none';
      img.src = '';
      icon.style.display = '';
      label.style.display = '';
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg> Activar preview`;
      btn.classList.remove('active');
      document.getElementById('btn-capture').disabled = true;
    }
  }

  async function capturePhoto() {
    const btn = document.getElementById('btn-capture');
    btn.disabled = true;
    btn.textContent = 'Capturando...';
    try {
      const res = await fetch('/calibration/capture', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        photos.push(data.filename);
        renderPhotos();
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg> Capturar`;
    }
  }

  async function deletePhoto(filename) {
    await fetch(`/calibration/photos/${filename}`, { method: 'DELETE' });
    photos = photos.filter(p => p !== filename);
    renderPhotos();
  }

  async function runCalibration() {
    const btn = document.getElementById('btn-calibrate');
    btn.disabled = true;
    btn.textContent = 'Calibrando...';
    try {
      const res = await fetch('/calibration/run', { method: 'POST' });
      const data = await res.json();
      const card = document.getElementById('result-card');
      const val = document.getElementById('result-value');
      const hint = document.getElementById('result-hint');
      card.classList.add('visible');
      val.textContent = data.reprojection_error.toFixed(4);
      if (data.reprojection_error < 1.0) {
        val.className = 'result-value result-ok';
        hint.textContent = '✓ Buena calibración — lista para usar';
      } else {
        val.className = 'result-value result-warn';
        hint.textContent = 'Intenta añadir más fotos variadas';
      }
    } catch(e) {
      alert('Error en calibración: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg> Calibrar`;
    }
  }

  function renderPhotos() {
    const grid = document.getElementById('photos-grid');
    const count = photos.length;
    document.getElementById('photo-count').textContent = count + ' fotos';
    document.getElementById('photo-count-label').textContent = count;
    document.getElementById('btn-calibrate').disabled = count < 5;
    if (count === 0) {
      grid.innerHTML = '<div class="empty-photos">Sin fotos todavía — activa el preview y captura el tablero</div>';
      return;
    }
    grid.innerHTML = photos.map(f => `
      <div class="photo-thumb">
        <img src="/calibration/photos/${f}/thumb" alt="${f}">
        <button class="del-btn" onclick="deletePhoto('${f}')">✕</button>
      </div>
    `).join('');
  }

  async function loadPhotos() {
    const res = await fetch('/calibration/photos');
    photos = await res.json();
    renderPhotos();
  }

  loadPhotos();
</script>
</body>
</html>
